<div class="d-inline-flex flex-column align-items-center gap-1" [style.--size]="size()" >
  @if (link()){
    <a [routerLink]="link()" routerLinkActive="active" [class]="btnClass()">  
      <ng-container [ngTemplateOutlet]="content" />
    </a>
  } @else {
    <button type="button" [class]="btnClass()" (click)="onClick()">   
      <ng-container [ngTemplateOutlet]="content" />
    </button>
  }
   @if (label_text()) {
    <span [class]="labelClass()">{{ label_text() }}</span>
  }
</div>


<ng-template #content>
  @if (text_icon()) {
    <span class="icon--text">{{ text_icon() }}</span>
  } @else {
    <i [class]="iconClass()"></i>
    @if (label_icon_text()) {
      <span class="label--icon-text">{{ label_icon_text() }}</span>
    }
  }
</ng-template>
