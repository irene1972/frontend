<section class="profile">

  <!-- Cabecera de perfil -->
  <div class="profile-header">
    <atom-icon variant="profile-primary-square" [text_icon]="iniciales()" size="1.6rem"></atom-icon>
    <div class="profile-header__info">
      <h1 class="profile-name">{{ nombre() }}</h1>
      <div class="profile-meta">
        <atom-icon variant="star" size="0.9rem"></atom-icon>
        <span>{{ ratingAverage() }} · {{ ratingTotal() }} valoraciones · En Buy&amp;Sell desde {{ desde() }}</span>
      </div>
    </div>
    <a class="profile-edit" [routerLink]="['/user/panel/edit-profile', userId]">Editar perfil</a>
  </div>

  <!-- Estadísticas (enlazan a su secciÓn + hover) -->
  <div class="profile-stats">
    <a class="stat-card-link" [routerLink]="['/user/panel/sales']">
      <molecule-status-card align="left" [status]="ventas().toString()" text="VENTAS"></molecule-status-card>
    </a>
    <a class="stat-card-link" [routerLink]="['/user/panel/my-purchases']">
      <molecule-status-card align="left" [status]="compras().toString()" text="COMPRAS"></molecule-status-card>
    </a>
    <a class="stat-card-link" [routerLink]="['/user/panel/sales']">
      <molecule-status-card align="left" [status]="activos().toString()" text="ARTíCULOS ACTIVOS"></molecule-status-card>
    </a>
    <div class="stat-card-link stat-card-static">
      <molecule-status-card align="left" [status]="ratingAverage().toString()" text="VALORACIONES"></molecule-status-card>
    </div>
  </div>

  <!-- Mis artículos publicados (reutiliza la article-card de Irene) -->
  <h2 class="section-title">Mis artículos publicados</h2>
  <div class="contenedor">
    @for (articulo of articulos(); track articulo.id) {
      <molecule-article-card
        variant="owner"
        [like]="false"
        [estadoArticulo]="articulo.estado_articulo_id"
        [img]="articulo.url_foto ?? 'imgs/no-photo.jpg'"
        [price]="precio(articulo)"
        [article_name]="articulo.titulo"
      ></molecule-article-card>
    } @empty {
      <p class="empty">Aún no tienes artículos publicados.</p>
    }
  </div>

</section>
