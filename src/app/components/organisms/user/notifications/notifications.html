<div class="notifications-container">

  <h1>Notificaciones</h1>

  <!-- Muestra el total real que viene del servidor (el 3 que vemos en tu consola) -->
  <p class="subtitle">
    Tienes {{ listaNotificaciones.length }} notificaciones
  </p>

  <!-- Si la lista estuviera vacía -->
  <div *ngIf="listaNotificaciones.length === 0" class="no-notifications" style="text-align: center; padding: 20px; color: #666;">
    <p>No tienes notificaciones por el momento.</p>
  </div>

  <!-- Bucle dinámico corregido para componentes Standalone modernos -->
  <div *ngFor="let notif of listaNotificaciones" class="notification-card" style="display: flex; align-items: center; background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; margin-bottom: 12px; color: #333;">

    <!-- Icono dinámico según el tipo -->
    <div class="notification-icon" style="width: 44px; height: 44px; border-radius: 50%; background: #f5f5f7; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; margin-right: 16px; flex-shrink: 0;">
      <span *ngIf="notif.tipo === 'sale'">€</span>
      <span *ngIf="notif.tipo === 'review'">⭐</span>
      <span *ngIf="notif.tipo === 'moderation'">⚠️</span>
    </div>

    <div class="notification-content" style="flex-grow: 1;">
      <h3 style="font-size: 16px; font-weight: 600; margin: 0 0 4px 0; color: #222;">{{ notif.titulo }}</h3>
      <p style="font-size: 14px; color: #555; margin: 0; line-height: 1.4;">{{ notif.mensaje }}</p>
    </div>

    <div class="notification-time" style="font-size: 12px; color: #999; margin-left: 12px; white-space: nowrap;">
      {{ notif.created_at | date:'HH:mm' }}
    </div>

  </div>

</div>
