<section>
    <div class="card mb-3">
        <div class="row g-0">
            <div class="col-md-4">
                <a [routerLink]="['/product',bestSellers[0].id]">
                    <img [src]="(bestSellers[0].url_foto)?bestSellers[0].url_foto:'/imgs/no-photo.jpg'"
                        class="img-fluid rounded-start" alt="">
                </a>
            </div>
            <div class="col-md-8 derecha">
                <div class="card-body">
                    <div class="flex">
                        <div class="fondo-azul-oscuro">DESTACADO</div>
                        @if(bestSellers[0]?.estado_conservacion_id==='Buen estado'){
                        <div class="fondo-azul-claro">COMO NUEVO</div>
                        }
                    </div>
                    <h5 class="card-title">{{bestSellers[0]?.titulo}}</h5>
                    <p class="card-text">{{bestSellers[0]?.provincia?.nombre}}. Vendedor verificado</p>
                    <span>849 €</span>
                    <div class="flex links">
                        <button [routerLink]="[`/product/${bestSellers[0].id}`]" type="button" class="btn btn-warning">Comprar ahora</button>
                        <a [routerLink]="[`/product/${bestSellers[0].id}`]" class="link">Ver detalle</a>
                        
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>
