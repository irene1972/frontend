<div class="nav-step">
    <div class="container">
        @for (step of steps(); track $index;let first = $first; let last = $last) {
        <div [class.active]="activeSteps().includes(step.query_param)"> 
            <p class="name">{{ step.name }}</p>
            <p class="label"  [class.first]="first" [class.last]="last" >{{ step.label }}</p>
        </div>
        @if(!last){
            <div class="separator"></div>
        }
    }
    </div>
</div>
