<div class="photo-uploader">
    <h2>3 · Fotografías</h2>
    <p>Muestra tu artículo desde todos los ángulos. Las fotos reales aumentan las ventas.</p>
    <div class="d-flex flex-column gap-4">
        <div [class]="['uploader','card', dragEvent()]"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"> 
            <atom-icon variant="camera"></atom-icon>
            <span class="guide-text-1"> Arrastra tus fotos aquí</span>
            <span class="guide-text-2">O selecciónalas desde tu ordenador</span>
            <input #fileInput type="file" accept="image/png, image/jpeg" multiple hidden (change)="onSelect($event)"/>
            <atom-button config_type="secondary" label="Seleccionar archivos" (clickButton)="fileInput.click()"></atom-button>
            <span class="guide-text-3">PNG, JPG HASTA 10MB</span>        
        </div>
        <div class="container-fluid">
            <div class="row gap-4">
                @for(photo of photoPreviews(); track $index;){
                    <div class="caption card"> 
                        <div class="clip-img d-flex flex-column justify-content-center align-items-center">
                        
                            @if(photo){<img [src]="photo" alt="">}
                            @else {<i class="bi bi-image" style="font-size: 2rem; color: var(--surface-high);"></i>}
                        </div>
                        @if($index===0){<div class="badge-principal">PRINCIPAL</div>}
                        <button [hidden]="photoPreviews()[$index]===''" class="remove-btn " (click)="removePhoto($index)">x</button>
                        <input #fileInput type="file" accept="image/png, image/jpeg" multiple hidden (change)="selectFile($event, $index)"/>
                        <button [hidden]="photoPreviews()[$index]!==''" class="add-btn" (click)="fileInput.click()">+</button>
                    </div>
                }
            </div>
        </div>
    </div>
</div>
