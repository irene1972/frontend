<section class="moderator-dashboard">

  <div class="dashboard-header">
    <h1>Panel de moderador</h1>
    <p>Hola, {{user.username}} · Tienes {{pendientes}} reportes pendientes de revisión</p>
  </div>

  <div class="stats-grid">
    <molecule-status-card [status]="pendientes.toString()" text="PENDIENTES"/>
    <molecule-status-card [status]="resueltos.toString()" text="RESUELTOS"/>
    <molecule-status-card [status]="abiertosHoy.toString()" text="ABIERTOS HOY"/>
  </div>

  <h2 class="section-title">Accesos</h2>

  <div class="management-grid">
    <molecule-management-card icon="flag" title="Reportes pendientes" text="{{pendientes}} · Artículos reportados por revisar" link='/moderator/panel/incidents' />
    <molecule-management-card icon="clock" title="Historial de moderación" text="Acciones que ya has realizado" link='/moderator/panel/historic' />
  </div>

</section>
