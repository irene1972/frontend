<div class="sidebar">
    <div class="header">
        <div class="initials">{{user.iniciales}}</div>
        <div class="moderator">
            <p>{{user.username}}</p>
            <div class="rol">
                <p>{{user.rol}}</p>
            </div>
        </div>
    </div>

    <nav class="nav-sidebar">
        <a [routerLink]="['/moderator/panel/main']" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
            <i class="bi bi-person"></i>
            <p>Panel</p>
        </a>
        <a [routerLink]="['/moderator/panel/incidents']" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
            <i class="bi bi-flag"></i>
            <p>Reportes pendientes</p>
        </a>
        <a class="historial" [routerLink]="['/moderator/panel/historic']" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
            <i class="bi bi-clock"></i>
            <p>Historial de reportes</p>
        </a>
    </nav>

    <nav class="cerrar-sesion">
        <button type="button" (click)="logout()">
            <i class="bi bi-box-arrow-right"></i>
            <p>Cerrar sesión</p>
        </button>
    </nav>
</div>
