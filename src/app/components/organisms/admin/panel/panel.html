<section class="admin-dashboard">

  <div class="dashboard-header">
    <h1>Panel de administración</h1>
    <p>Hola, Admin · Resumen y gestión global de la plataforma</p>
  </div>

  <div class="stats-grid">
    <molecule-status-card [status]="estadisticas.usuarios_activos?.total"     text="USUARIOS"/>
    <molecule-status-card [status]="estadisticas.articulos_publicados?.total" text="ARTÍCULOS"/>
    <molecule-status-card [status]="estadisticas.articulos_vendidos?.total"   text="VENDIDOS"/>
    <molecule-status-card class="desktop-only" [status]="estadisticas.categorias_activas?.total"   text="CATEGORÍAS"/>
    <molecule-status-card class="desktop-only" [status]="estadisticas.reportes_pendientes?.total"  text="REPORTES"/>
    <molecule-status-card class="desktop-only" [status]="estadisticas.articulos_retirados?.total"  text="RETIRADOS"/>
  </div>

  <h2 class="section-title">Gestión</h2>

  <div class="management-grid">
    <molecule-management-card icon="people" title="Usuarios y roles" text="Gestiona cuentas, roles y bloqueos" link='/admin/panel/users' />
    <molecule-management-card icon="tag" title="Categorías y roles" text="Crea y edita el catálogo" link='/admin/panel/categories' />
    <molecule-management-card icon="graph" title="Estadísticas y roles" text="Métricas globales de la plataforma" link='/admin/panel/statistics' />
    <molecule-management-card icon="flag" title="Reportes pendientes y roles" text="8" link='/admin/panel/reports' />
    <molecule-management-card icon="clock" title="Historial de moderación" text="Acciones que ya has realizado" link='/admin/panel/historic' />
  </div>

</section>
