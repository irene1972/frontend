<section class="categorias">
    
    <molecule-breadcrum [items]="breadcrumbItems()" />

    <div class="heading">
        <div>
            <h1>Categorías</h1>
            <p class="descripcion">Gestiona el catálogo de categorías</p>
        </div>
        <div>
            <button class="btn btn-secondary nueva" [routerLink]="['/admin/panel/categories/create']">+ Crear nueva categoría</button>
        </div>
    </div>
        
    

    <div class="cat">
        @if(categorias){
            @for(categoria of categorias;track categoria.id){
                <div class="card">
                    <div class="card-body">
                        <div class="icono-categoria">
                            @if (categoria.icono) {
                                <img [src]="categoria.icono" [alt]="categoria.nombre">
                            }@else {
                                <i class="bi bi-tag"></i>
                            }
                        </div>
                    
                        <div class="info-categoria">
                            <h2 class="card-title">{{categoria.nombre}}</h2>
                            <h6 class="card-subtitle mb-2 text-muted">Nº de artículos: {{categoria.total_articulos}}</h6>
                        </div>
                    
                        <div class="acciones">
                            <a [routerLink]="['/admin/panel/categories/edit/', categoria.id]">
                                <span class="texto-accion">Editar</span>
                                <i class="bi bi-pencil"></i>
                            </a>
                        
                            <a class="borrar" (click)="borrar(categoria.id)">
                                <span class="texto-accion">Borrar</span>
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </div>
                </div>
            }@empty{
                <p>No hay datos</p>
            }
            }
    </div>
</section>
