<div class="drawer-backdrop" (click)="closeMenuOnly()"></div>

<aside class="drawer-menu">

    <div class="drawer-header">
        <h5>Menú</h5>

        <button class="btn close-button" type="button" (click)="closeMenuOnly()">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <div class="drawer-user">
        <a class="drawer-avatar" [routerLink]="['/user/profile']" (click)="closeMenuOnly()">
            {{user.iniciales}}
        </a>

        <div>
            <p class="drawer-user-name">{{user.username}}</p>
            <a class="drawer-user-profile" [routerLink]="['/user/profile']" (click)="closeMenuOnly()">
                {{user.rol}}
            </a>
        </div>
    </div>

    <section class="drawer-section">
        <h6>Navegación</h6>

        <a [routerLink]="['/admin/panel/main']" (click)="closeMenuOnly()">
            Panel de administración
            <i class="bi bi-chevron-right"></i>
        </a>

        <a [routerLink]="['/admin/panel/users']" (click)="closeMenuOnly()">
            Usuarios y roles
            <i class="bi bi-chevron-right"></i>
        </a>

        <a [routerLink]="['/admin/panel/categories']" (click)="closeMenuOnly()">
            Categorías
            <i class="bi bi-chevron-right"></i>
        </a>

        <a [routerLink]="['/admin/panel/statistics']" (click)="closeMenuOnly()">
            Estadísticas
            <i class="bi bi-chevron-right"></i>
        </a>
    </section>

    <section class="drawer-section">
        <a [routerLink]="['/user/profile']" (click)="closeMenuOnly()">
            Mi perfil
            <i class="bi bi-chevron-right"></i>
        </a>
    </section>

    <section class="drawer-section">
        <button class="logout-button" type="button" (click)="logout()">
            Cerrar sesión
        </button>
    </section>

</aside>
