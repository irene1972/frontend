<div class="admin-moderator-header w-100">
    <div class="admin-moderator-top d-flex align-items-center">

        <button class="btn menu-button d-md-none" type="button" (click)="openMenu()">
            <i class="bi bi-list"></i>
        </button>

        <a [routerLink]="['/admin/panel/main']">
            <img src="logo_blue.svg" alt="Buy&Sell" class="logo-img">
        </a>

        <div class="admin-moderator-actions d-flex align-items-center gap-3">
            <a class="avatar" [routerLink]="['/admin/panel/profile']">
                {{userInitials}}
            </a>             
        </div>
    </div>
</div>

@if (isMenuOpen) {
    <app-admin-moderator-menu-drawer (closeMenu)="closeMenu()"></app-admin-moderator-menu-drawer>
}
