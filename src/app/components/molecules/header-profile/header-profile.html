<div class="header">
    <atom-icon variant="profile-primary-square" [text_icon]="text_icon()" size="2rem"></atom-icon>
    <div class="profile">
        <p class="text-profile">{{text_profile()}}</p>
        <div class="stars">
            <atom-icon variant="star" size="1rem"></atom-icon>
            <p>{{rating_average()}} <span>({{rating_total()}})</span> </p>
        </div>
    </div>
</div>
