<a [routerLink]="">
        <div class="card">
          <div class="card-user">
            <div class="card-body cont">
              <atom-icon class="profile" variant="profile" text_icon="{{iniciales}}" size="1.5rem" />
              <div class="user">
                <h3 class="card-title">{{nombre}}</h3>
                <p><atom-icon class="star" variant="star" size=".9rem" />{{estrellas}} . {{valoraciones}} valoraciones</p>
              </div>
            </div>
            <div class="label">
              <div class="derecha">
                <atom-button 
                    class="perfil" 
                    label="{{texto_boton}}" 
                    config_type="outline"
                    (click)="onClick()" 
                    ></atom-button>
                <atom-icon class="heart" variant="heart" size="1.6rem" />
              </div>

            </div>
          </div>
        </div>
      </a>
