
<molecule-user-card [name]="name()" [last_name]="last_name()">
    <p class="year m-0 p-0"> Vendedor · Miembro desde {{year()}} </p>
    <atom-badge class="pt-1 pb-1 m-0" variant="Verificado" icon="shield-check" />
    <a class="report" [routerLink]="routeReport()">
        <i class="bi bi-flag-fill color-red"></i>
        <p>Reportar usuario</p>
    </a>
    <atom-button action class="contact" config_type="secondary" label="Contactar" [routerLink]="routeContact()"/>
</molecule-user-card>
