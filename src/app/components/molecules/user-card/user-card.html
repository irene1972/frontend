<div class="user-card" [class.background]="transparent()" [class.boxshadow]="shadow()">
    <atom-icon variant="profile-primary-circle" [text_icon]="`${name()[0]}${last_name()[0]}`" size="1rem" class="p-4" />
    <div class="user-content">
        <h2 class="user-name"> {{`${name()} ${last_name()[0]}.`}}</h2>
        <ng-content />
    </div>
    <div class="d-flex flex-grow-1"></div>
    <div class="user-action d-flex flex-row align-items-center gap-3 pe-4">
        @if(role()){
            <atom-badge [variant]="role()!"></atom-badge>
        }
        @if(arrow()){
            <span class="user-arrow">></span>
        }
    </div>
</div>
