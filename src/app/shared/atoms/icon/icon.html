<div class="d-inline-flex flex-column align-items-center gap-1"
  [style.--size]="size()" >
  <div [class]="containerClass()">
    @if (text_icon()) {
      <span [class]="icontextClass()" >{{ text_icon() }}</span>
    } @else {
      <i [class]="iconClass()"></i>
    }
  </div>
  @if (label_text()) {
    <span [class]="labelClass()">{{ label_text() }}</span>
  }
</div>
