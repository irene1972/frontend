<div class="drawer-backdrop" (click)="close()"></div>

<aside class="drawer-menu">
    <div class="drawer-header">
        <h5>Menú</h5>

        <button class="btn close-button" type="button" (click)="close()">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <div class="drawer-user">
        <a class="drawer-avatar" [routerLink]="['/user/profile']" (click)="close()">
            {{userInitials}}
        </a>

        <div>
            <p class="drawer-user-name">{{userName}}</p>
            <a class="drawer-user-rating" [routerLink]="['/user/profile']" (click)="close()">
                ★ {{userRating}} · Ver mi perfil
            </a>
        </div>
    </div>

    <section class="drawer-section">
        <h6>Categorías</h6>

        <a href="#">Todo <i class="bi bi-chevron-right"></i></a>
        <a href="#">GPUs <i class="bi bi-chevron-right"></i></a>
        <a href="#">CPUs <i class="bi bi-chevron-right"></i></a>
        <a href="#">Portátiles <i class="bi bi-chevron-right"></i></a>
        <a href="#">Consolas <i class="bi bi-chevron-right"></i></a>
        <a href="#">RAM <i class="bi bi-chevron-right"></i></a>
        <a href="#">Placas base <i class="bi bi-chevron-right"></i></a>
        <a href="#">Discos <i class="bi bi-chevron-right"></i></a>
    </section>

    <section class="drawer-section">
        <h6>Mi cuenta</h6>

        <a [routerLink]="['/user/favorites']" (click)="close()">Favoritos <i class="bi bi-chevron-right"></i></a>
        <a href="#">Mis ventas <i class="bi bi-chevron-right"></i></a>
        <a href="#">Mis compras <i class="bi bi-chevron-right"></i></a>
        <a href="#">Mis valoraciones <i class="bi bi-chevron-right"></i></a>
        <a [routerLink]="['/user/edit-profile/:userID']" (click)="close()">Editar perfil <i class="bi bi-chevron-right"></i></a>
    </section>

    <section class="drawer-section">
        <h6>Ayuda</h6>

        <a href="#">Centro de ayuda <i class="bi bi-chevron-right"></i></a>
        <a href="#">Reglas de convivencia <i class="bi bi-chevron-right"></i></a>
        <a href="#">Consejos de seguridad <i class="bi bi-chevron-right"></i></a>
    </section>

    <section class="drawer-section">
        <button class="logout-button" type="button" (click)="close()">
            Cerrar sesión
        </button>
    </section>
</aside>
