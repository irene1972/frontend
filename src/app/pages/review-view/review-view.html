<main class="rating-layout__content">
    <molecule-breadcrum [items]="breadcrumbItems()"></molecule-breadcrum>
    <div class="p-3">
        <div class="rating-layout__reviewCard">
            <h2 class="fs-4 fw-bold">Valoración</h2>
            <molecule-user-rating-comment [timestamp]="reviewTimestamp()" name="{{valorador()?.nombre}}" last_name="{{valorador()?.apellidos}}" class="rating-card">
                    <p>{{review()?.mensaje}}</p>
            </molecule-user-rating-comment>
        </div>
        <!-- Transacción -->
        <div class="transaccion mt-4">
            <p class="transaccion__label">TRANSACCIÓN ASOCIADA</p>
            <div class="transaccion__card">
                <!-- Imagen del producto -->
                <div class="transaccion__img">
                    <img src="{{photos()?.[0]}}" alt="">
                </div>

                <!-- Info -->
                <div class="transaccion__info">
                    <span class="transaccion__titulo">{{product()?.titulo}}</span>
                    <span class="transaccion__meta">{{product()?.estado_articulo_id}} · {{product()?.updated_at | date:'dd/MM/yyyy'}}</span>
                </div>

                <!-- Precio y badge -->
                <div class="transaccion__right">
                    <span class="transaccion__precio">{{product()?.precio}} €</span>
                    <atom-badge variant="{{product()?.estado_articulo_id}}"></atom-badge>
                </div>
            </div>
        </div> 
    </div>
</main>
