<molecule-breadcrum [items]="breadcrumbItems()"/>
<div class="container">
    <h2 class="fw-bold fs-2">Reportar artículo</h2>
    <h3 class="fs-3">Producto: {{ reportedProduct()?.titulo }}</h3>
    <div class="form p-4">
        <p class="fw-bold fs-4">¿Por qué reportas este artículo?</p>
        <p>Tu reporte ayudará a mantener nuestra comunidad segura y respetuosa.</p>
        <form [formGroup]="reportForm" (ngSubmit)="getDataForm()">
            <div class="form-group">
                <label for="motivo">Motivo:</label>
                <input type="text" id="motivo" formControlName="motivo">
            </div>
            <div class="form-group">
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" formControlName="descripcion"></textarea>
            </div>
            <atom-button label="Enviar reporte" config_type="secondary"></atom-button>
        </form>
    </div>
</div>
