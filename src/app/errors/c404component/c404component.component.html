<app-home-bar></app-home-bar>
<div class="error-layout">
    <aside class="error-layout__sidebar">
        <organism-sidebar></organism-sidebar>
    </aside>

    <main class="error-layout__content">
        <h2 class="error-title">404</h2>
        <h3 class="error-subtitle">Página no encontrada</h3>
        <p class="error-text">La página que estás buscando no existe o ha sido movida. Comprueba la dirección o vuelve al inicio.</p>
        <atom-button config_type="secondary" label="Volver al inicio" (click)="gotoHome()"></atom-button>
    </main>
</div>
